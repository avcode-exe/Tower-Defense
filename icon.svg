<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1418"/>
      <stop offset="100%" style="stop-color:#070b0f"/>
    </linearGradient>
    <linearGradient id="towerBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="spire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Tower shadow -->
  <ellipse cx="256" cy="420" rx="100" ry="16" fill="rgba(0,0,0,0.35)"/>

  <!-- Tower base -->
  <rect x="190" y="340" width="132" height="70" rx="6" fill="url(#towerBody)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Tower body -->
  <rect x="210" y="220" width="92" height="130" rx="6" fill="url(#towerBody)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Tower top section -->
  <rect x="224" y="160" width="64" height="64" rx="4" fill="url(#towerBody)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Spire -->
  <polygon points="256,60 232,120 280,120" fill="url(#spire)" filter="url(#glow)"/>

  <!-- Spire tip glow -->
  <circle cx="256" cy="64" r="6" fill="#f1c40f" opacity="0.6"/>

  <!-- Windows / slits -->
  <rect x="234" y="180" width="10" height="24" rx="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="262" y="180" width="10" height="24" rx="2" fill="rgba(0,0,0,0.3)"/>

  <rect x="234" y="240" width="44" height="10" rx="2" fill="rgba(0,0,0,0.25)"/>

  <!-- Watchman / embrasures -->
  <rect x="224" y="150" width="14" height="10" rx="2" fill="rgba(0,0,0,0.2)"/>
  <rect x="242" y="150" width="12" height="10" rx="2" fill="rgba(0,0,0,0.2)"/>
  <rect x="258" y="150" width="12" height="10" rx="2" fill="rgba(0,0,0,0.2)"/>
  <rect x="274" y="150" width="14" height="10" rx="2" fill="rgba(0,0,0,0.2)"/>

  <!-- Base windows -->
  <rect x="204" y="360" width="20" height="28" rx="3" fill="rgba(0,0,0,0.25)"/>
  <rect x="234" y="360" width="44" height="28" rx="3" fill="rgba(0,0,0,0.25)"/>
  <rect x="288" y="360" width="20" height="28" rx="3" fill="rgba(0,0,0,0.25)"/>

  <!-- Decorative line -->
  <rect x="190" y="338" width="132" height="3" rx="1" fill="rgba(255,255,255,0.08)"/>
  <rect x="210" y="218" width="92" height="3" rx="1" fill="rgba(255,255,255,0.08)"/>
</svg>